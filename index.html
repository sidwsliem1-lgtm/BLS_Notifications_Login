<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>نظام الحماية - تسجيل الجهاز</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://i.postimg.cc/L5dNvXmC/BLS.png">
    <link rel="shortcut icon" href="https://i.postimg.cc/L5dNvXmC/BLS.png">
    
    <!-- تم تعديل المسار: أصبح /style.css بدلاً من /static/style.css -->
    <link rel="stylesheet" href="/style.css">
    
    <!-- FingerprintJS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ----- RESET & BASE (أسود وذهبي فاخر) ----- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #0a0a0a, #000000);
            font-family: 'Segoe UI', 'Tajawal', 'Cairo', system-ui, -apple-system, BlinkMacSystemFont, 'Roboto', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
        }

        /* تأثير خلفية لامعة خفيفة */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at 30% 40%, rgba(212, 175, 55, 0.08), transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            width: 100%;
            max-width: 520px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            animation: fadeSlideUp 0.6s ease-out;
        }

        /* كارد ذهبي مضيء بحدود لامعة */
        .card {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2rem 1.8rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(212, 175, 55, 0.2), 0 0 0 3px rgba(0, 0, 0, 0.5);
            transition: transform 0.25s ease, box-shadow 0.4s;
            border: 1px solid rgba(212, 175, 55, 0.4);
        }

        .card:hover {
            box-shadow: 0 30px 55px -12px rgba(0, 0, 0, 1), 0 0 0 1px rgba(212, 175, 55, 0.7);
            border-color: rgba(212, 175, 55, 0.6);
        }

        /* الهيدر الذهبي */
        .header {
            text-align: center;
            margin-bottom: 2rem;
            position: relative;
        }

        .header h1 {
            font-size: 1.9rem;
            font-weight: 800;
            background: linear-gradient(135deg, #e9c476 0%, #b8860b 40%, #f7e05e 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
            letter-spacing: -0.5px;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .header p {
            color: #cdb87a;
            margin-top: 0.6rem;
            font-size: 0.95rem;
            font-weight: 400;
            background: rgba(0, 0, 0, 0.5);
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            letter-spacing: 0.3px;
        }

        /* المجموعات */
        .form-group {
            margin-bottom: 1.6rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #e5d5a8;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        input {
            width: 100%;
            padding: 0.9rem 1.2rem;
            background: #111111;
            border: 1.5px solid #2a2a2a;
            border-radius: 1.2rem;
            font-size: 1rem;
            font-family: inherit;
            color: #faf3dd;
            transition: all 0.25s ease;
            outline: none;
            caret-color: #d4af37;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.5);
        }

        input:focus {
            border-color: #d4af37;
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.3), inset 0 1px 2px #000;
            background: #0c0c0c;
        }

        input::placeholder {
            color: #4a4a4a;
            font-weight: 400;
        }

        /* زر ذهبي لامع مع تأثيرات */
        button {
            width: 100%;
            background: linear-gradient(105deg, #b8860b 0%, #e4b634 45%, #ffdf7e 100%);
            border: none;
            padding: 0.9rem 0;
            border-radius: 2.5rem;
            font-weight: 800;
            font-size: 1.1rem;
            font-family: inherit;
            color: #0a0a0a;
            cursor: pointer;
            transition: all 0.25s;
            margin-top: 0.5rem;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(255, 215, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 220, 0.5), transparent);
            transition: left 0.6s ease;
        }

        button:hover::before {
            left: 100%;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.5), 0 0 0 1px #ffdf7e;
            background: linear-gradient(105deg, #d4af37, #f3d572, #ffea9e);
        }

        button:active {
            transform: translateY(2px);
        }

        .btn-loader {
            font-weight: 700;
        }

        /* result box */
        .result {
            margin-top: 1.8rem;
            padding: 1rem;
            border-radius: 1.2rem;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
            background: rgba(0, 0, 0, 0.7);
            border-right: 4px solid #d4af37;
            color: #f5e2b0;
            transition: all 0.2s;
            backdrop-filter: blur(8px);
        }

        .result.error {
            border-right-color: #ff4d4d;
            color: #ffbf9f;
            background: rgba(50, 0, 0, 0.6);
        }

        /* تأثيرات متحركة خفيفة */
        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* استجابة للجوال */
        @media (max-width: 520px) {
            .container {
                max-width: 96%;
            }
            .card {
                padding: 1.5rem;
            }
            .header h1 {
                font-size: 1.6rem;
            }
            input {
                padding: 0.75rem 1rem;
            }
        }

        /* تحسين التمرير */
        body::-webkit-scrollbar {
            width: 6px;
        }
        body::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        body::-webkit-scrollbar-thumb {
            background: #d4af37;
            border-radius: 8px;
        }

        /* جعل الزر معطل بتأثير باهت */
        button:disabled {
            opacity: 0.8;
            transform: none;
            filter: grayscale(0.1);
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <h1>🛡️ نظام الحماية</h1>
                <p>By Youssef</p>
            </div>
            
            <form id="trackForm">
                <div class="form-group">
                    <label for="fullName">👤 الاسم الكامل</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="أدخل اسمك الكامل">
                </div>
                
                <div class="form-group">
                    <label for="phone">📱 رقم الهاتف</label>
                    <input type="tel" id="phone" name="phone" required placeholder="01XXXXXXXXX">
                </div>
                
                <button type="submit" id="submitBtn">
                    <span class="btn-text">تسجيل الجهاز</span>
                    <span class="btn-loader" style="display: none;">جاري...</span>
                </button>
            </form>
            
            <div id="result" class="result" style="display: none;"></div>
        </div>
    </div>
    
    <!-- تم تعديل المسار: أصبح /app.js بدلاً من /static/app.js -->
    <script src="/app.js"></script>
</body>
</html>
